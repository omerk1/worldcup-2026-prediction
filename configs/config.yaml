data:
  results_url: "https://raw.githubusercontent.com/martj42/international_results/master/results.csv"
  goalscorers_url: "https://raw.githubusercontent.com/martj42/international_results/master/goalscorers.csv"
  fifa_ranking_url: "https://raw.githubusercontent.com/Dato-Futbol/fifa-ranking/master/ranking_fifa_historical.csv"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  fixtures_dir: "data/fixtures"

model:
  # Time-decay: weight = exp(-decay_rate * days_ago). Half-life ~ ln(2)/decay_rate.
  decay_half_life_days: 730   # ~2 years

  # Lookback window for matches used in fitting (older matches get ~0 weight anyway,
  # but this caps compute and avoids long-defunct national teams).
  lookback_years: 12

  # Strength prior (FIFA ranking + Elo, blended): pulls each team's attack/defense
  # toward a rating implied by its global standing (z-score scaled by this constant).
  strength_prior_scale: 0.35

  # L2 regularization strength toward the strength prior. Higher = trust the prior
  # more, data-driven fit less. Mostly matters for teams with little history.
  strength_prior_weight: 5.0

  # Dixon-Coles low-score correlation parameter is fit jointly; this is just
  # the optimizer starting point.
  rho_init: -0.05

  # Host nations get a home-advantage boost only in their own country's matches.
  host_nations:
    - "Mexico"
    - "Canada"
    - "United States"

  # Exclude matches where the weaker team's FIFA ranking points are below this
  # threshold. Removes "blowout vs minnow" results (e.g. qualifier rout of a
  # part-time federation) that distort attack/defense ratings for World
  # Cup-level matchups. All 48 World Cup 2026 teams are above ~1247 points.
  min_fifa_points_threshold: 1100

# Tournament-importance weighting: multiplies the time-decay weight in the
# Dixon-Coles fit, and scales the Elo K-factor, so that World Cup results
# matter most and friendlies matter least.
tournament_weights:
  world_cup: 2.5
  continental: 1.5
  qualifier: 1.0
  friendly: 0.3
  other: 0.5
  world_cup_names:
    - "FIFA World Cup"
  continental_names:
    - "UEFA Euro"
    - "Copa América"
    - "African Cup of Nations"
    - "AFC Asian Cup"
    - "Gold Cup"
    - "CONCACAF Gold Cup"
    - "OFC Nations Cup"
  qualifier_keywords:
    - "qualification"
    - "Nations League"

elo:
  initial_rating: 1500.0
  base_k_factor: 24.0
  home_advantage: 60.0

tournament:
  groups_file: "data/fixtures/worldcup_2026_groups.csv"
  fixtures_file: "data/fixtures/worldcup_2026_fixtures.csv"

# Points awarded by predict_best_guess.py's "3 for exact score, X for
# direction only" prediction game, by tournament stage. `exact` is the total
# points for an exact score (not stacked with `direction`).
scoring:
  group_stage:
    direction: 1
    exact: 3
  round_of_32:
    direction: 2
    exact: 5
  round_of_16:
    direction: 2
    exact: 5
  quarterfinal:
    direction: 4
    exact: 8
  semifinal:
    direction: 5
    exact: 10
  third_place:
    direction: 5
    exact: 10
  final:
    direction: 8
    exact: 15